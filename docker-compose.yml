services:
  db:
    image: mysql:8.0
    container_name: beptroly-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: Bep_Tro_Ly
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./dotnet_backend
      dockerfile: Dockerfile
    container_name: beptroly-api
    restart: always
    ports:
      - "5001:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=Bep_Tro_Ly;Uid=root;Pwd=${DB_PASSWORD};
      - Jwt__SecretKey=${JWT_SECRET}
      - Spoonacular__ApiKey=${SPOONACULAR_API_KEY}
      - Spoonacular__BaseUrl=${SPOONACULAR_BASE_URL:-https://api.spoonacular.com}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - GoogleAuth__ClientId=${GOOGLE_CLIENT_ID}
      - Database__ServerVersion=8.0.36-mysql
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/wwwroot/uploads

volumes:
  db_data:
  uploads_data:
